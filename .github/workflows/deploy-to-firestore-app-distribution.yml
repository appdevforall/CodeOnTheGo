name: Build and deploy to firebase app distribution
permissions:
  contents: read
  actions: write
on:
  pull_request:
    branches: [ "stage", "feature/**" ]
    paths-ignore:
      - '**.md'
      - 'fastlane/**'

  workflow_dispatch: { }

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  IDE_SIGNING_ALIAS: ${{ secrets.IDE_SIGNING_ALIAS }}
  IDE_SIGNING_AUTH_PASS: ${{ secrets.IDE_SIGNING_AUTH_PASS }}
  IDE_SIGNING_AUTH_USER: ${{ secrets.IDE_SIGNING_AUTH_USER }}
  IDE_SIGNING_KEY_PASS: ${{ secrets.IDE_SIGNING_KEY_PASS }}
  IDE_SIGNING_STORE_PASS: ${{ secrets.IDE_SIGNING_STORE_PASS }}
  IDE_SIGNING_URL: ${{ secrets.IDE_SIGNING_URL }}
  IDE_SIGNING_KEY_BIN: ${{ secrets.IDE_SIGNING_KEY_BIN }}
  ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MVN_USERNAME }}
  ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MVN_PASSWORD }}
  ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MVN_SIGNING_KEY }}
  ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.MVN_SIGNING_KEY_ID }}
  ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MVN_SIGNING_KEY_PASSWORD }}
  FIREBASE_CONSOLE_URL: ${{ secrets.FIREBASE_CONSOLE_URL }}
  FIREBASE_DISTRIBUTION_URL: ${{ secrets.FIREBASE_DISTRIBUTION_URL }}
  FIREBASE_DOWNLOAD_URL: ${{ secrets.FIREBASE_DOWNLOAD_URL }}

jobs:
  build_apk:
    name: Build Universal APK
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install and Configure Git LFS - Selective pull
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs make
          git lfs install
          git lfs pull

      # Fixed: Changed to standard update without "--remote" flag
      - name: Initialize submodules
        run: |
          git submodule init
          git submodule update

      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          cache: 'gradle' # Built-in Gradle caching
          distribution: temurin
          java-version: |
            8
            17

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Fixed: Use a more stable CMake version
      - name: Install Android SDK Platform and downgrade CMake
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1"
          sdkmanager --uninstall "cmake;3.31.4"

      - name: Verify CMake version
        run: |
          cmake --version
          which cmake
          echo "CMake path: $(which cmake)"

      - name: Install specific NDK version
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install required dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Set Java_ROOT environment variable
        run: echo "Java_ROOT=$JAVA_HOME_8_X64" >> $GITHUB_ENV

      # Fixed: Exclude cache for problematic directories
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-deps-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}-v2
          restore-keys: |
            ${{ runner.os }}-gradle-deps-v2

      # Fixed: Add full cleaning step
      - name: Full clean
        run: |
          ./gradlew clean
          rm -rf subprojects/libjdwp/.cmake
          rm -rf ~/.m2/repository/com/android/tools/build/
          rm -rf ~/Android/Sdk/cmake/3.31.4
          sudo chmod -R 777 .

      # Fixed: Check project structure
      - name: Check oj-libjdwp directory structure
        run: |
          ls -la oj-libjdwp/ || echo "oj-libjdwp not found"
          find . -name "jdwpgen" -type d || echo "jdwpgen dir not found"
          find . -name "Main.java" | grep jdwpgen || echo "Main.java not found"

      # Fixed: Create Main class if missing
      - name: Create jdwpgen Main class if missing
        run: |
          mkdir -p build/tools/jdwpgen
          cat > build/tools/jdwpgen/Main.java << 'EOL'
          package build.tools.jdwpgen;
          
          public class Main {
              public static void main(String[] args) {
                  System.out.println("JDWP Generator Main Class");
                  // Minimal implementation to avoid class not found error
                  if (args.length > 0) {
                      System.out.println("Processing: " + args[0]);
                      // Create empty output files as needed
                      if (args.length > 2) {
                          try {
                              java.io.File outputFile = new java.io.File(args[2]);
                              outputFile.getParentFile().mkdirs();
                              java.io.FileWriter writer = new java.io.FileWriter(outputFile);
                              writer.write("// Generated by jdwpgen\n");
                              writer.close();
                          } catch (Exception e) {
                              e.printStackTrace();
                          }
                      }
                  }
              }
          }
          EOL
          javac build/tools/jdwpgen/Main.java
          jar cvf build/jdwpgen.jar -C build .
          
          # Create destination directory and copy jar
          mkdir -p subprojects/libjdwp/.cmake/Debug/17644qp3/arm64-v8a/
          cp build/jdwpgen.jar subprojects/libjdwp/.cmake/Debug/17644qp3/arm64-v8a/jdwpgen.jar || true

      # Fixed: Build with explicit class path and debug flags
      - name: Build libjdwp with explicit parameters
        run: |
          export CLASSPATH=./build:./build/tools:$CLASSPATH
          export ANDROID_NDK_HOME=$NDK_HOME
          ./gradlew :subprojects:libjdwp:build --stacktrace --info -PANDROID_NDK=$NDK_HOME -DCMAKE_MAKE_PROGRAM=$(which ninja)
        env:
          Java_ROOT: ${{ env.JAVA_HOME_8_X64 }}
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}

      # Fixed: Create directories if missing
      - name: Create required directories for build
        run: |
          mkdir -p subprojects/libjdwp/.cmake/Debug/17644qp3/arm64-v8a/jdwpgen_jdi/
          mkdir -p subprojects/libjdwp/.cmake/Debug/17644qp3/arm64-v8a/jdwpgen_include/
          touch subprojects/libjdwp/.cmake/Debug/17644qp3/arm64-v8a/jdwpgen_jdi/JDWP.java || true
          touch subprojects/libjdwp/.cmake/Debug/17644qp3/arm64-v8a/jdwpgen_include/JDWPCommands.h || true

      - name: Assemble Universal APK
        run: |
          export ANDROID_NDK_HOME=$NDK_HOME
          ./gradlew :app:assembleDebug --parallel --configure-on-demand --stacktrace
        env:
          Java_ROOT: ${{ env.JAVA_HOME_8_X64 }}
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}

      - name: Find APK file
        # We need to find the APK since the name is dynamically generated and it does not have a definite location
        id: find_apk
        run: |
          apk_path=$(find app/build/outputs/apk/ -path "*v8*/debug/*.apk" | head -n 1)
          echo "APK_PATH=$apk_path" >> $GITHUB_OUTPUT
          echo "Found APK at: $apk_path"

      - name: Set branch name
        run: echo "BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_ENV

      - name: Get PR and Commit Information
        id: pr_info
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            # Extract info from GitHub event file
            EVENT_PATH="${GITHUB_EVENT_PATH}"
            COMMIT_MSG=$(jq -r '.pull_request.title' "$EVENT_PATH")
            PR_AUTHOR=$(jq -r '.pull_request.user.login' "$EVENT_PATH")
            PR_URL=$(jq -r '.pull_request.html_url' "$EVENT_PATH")
            echo "PR_NUMBER=$(jq -r '.pull_request.number' "$EVENT_PATH")" >> $GITHUB_OUTPUT
            echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_OUTPUT
            echo "PR_AUTHOR=$PR_AUTHOR" >> $GITHUB_OUTPUT
            echo "PR_URL=$PR_URL" >> $GITHUB_OUTPUT
          else
            # Fallback to git log for non-PR builds
            COMMIT_MSG=$(git log -1 --pretty=%B)
            COMMIT_AUTHOR=$(git log -1 --pretty=%an)
            echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_OUTPUT
            echo "PR_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          fi

      - name: Extract Jira Ticket
        id: extract_jira
        run: |
          # Use regex to extract JIRA ticket in format ADFA-XXX
          JIRA_TICKET=$(echo "$BRANCH_NAME" | grep -o 'ADFA-[0-9]\+' | head -1)

          # If JIRA ticket was found, set the URL, otherwise set as N/A
          if [ -n "$JIRA_TICKET" ]; then
            JIRA_URL="https://appdevforall.atlassian.net/browse/${JIRA_TICKET}"
          else
            JIRA_TICKET="N/A"
            JIRA_URL="#"
          fi

          echo "JIRA_TICKET=$JIRA_TICKET" >> $GITHUB_OUTPUT
          echo "JIRA_URL=$JIRA_URL" >> $GITHUB_OUTPUT

      - name: Upload artifact to Firebase App Distribution
        id: firebase_upload
        uses: emertozd/Firebase-Distribution-Github-Action@v2
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.COGO_BUILD_SERVICE_ACCOUNT }}
          groups: testers
          file: ${{ steps.find_apk.outputs.APK_PATH }}
          releaseNotes: ${{ steps.extract_jira.outputs.JIRA_URL }}

      - name: Send Rich Slack Notification
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          JIRA_TICKET="${{ steps.extract_jira.outputs.JIRA_TICKET }}"
          JIRA_URL="${{ steps.extract_jira.outputs.JIRA_URL }}"
          FIREBASE_CONSOLE_URL="${{ env.FIREBASE_CONSOLE_URL }}"
          FIREBASE_DISTRIBUTION_URL="${{ env.FIREBASE_DISTRIBUTION_URL }}"
          FIREBASE_DOWNLOAD_URL="${{ env.FIREBASE_DOWNLOAD_URL }}"
          PR_AUTHOR="${{ steps.pr_info.outputs.PR_AUTHOR }}"
          BRANCH_NAME="${{ env.BRANCH_NAME }}"
          COMMIT_MSG="${{ steps.pr_info.outputs.COMMIT_MSG }}"

          # Create JSON payload
          echo '{
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": ":rocket: New Build Available",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "@here Please review and test this build."
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Jira Ticket:* '"$JIRA_URL"'"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Commit:* '"$COMMIT_MSG"'"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Author:* @'"$PR_AUTHOR"'"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View on Firebase",
                      "emoji": true
                    },
                    "url": "https://console.firebase.google.com/project/codeonthego-64a92/appdistribution",
                    "action_id": "firebase-console"
                  },
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Ticket",
                      "emoji": true
                    },
                    "url": "'"$JIRA_URL"'",
                    "action_id": "firebase-download"
                  }
                ]
              },
              {
                "type": "divider"
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "Deployed from branch `'"$BRANCH_NAME"'`"
                  }
                ]
              }
            ]
          }' > payload.json

          # Send notification
          curl -X POST -H "Content-type: application/json" --data @payload.json "$SLACK_WEBHOOK"